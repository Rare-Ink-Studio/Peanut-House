<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Peanut House Adventure</title>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Comic Sans MS", "Trebuchet MS", Arial, sans-serif;
      color: #3b2414;
      background: #8fd3ff;
      touch-action: manipulation;
    }

    button {
      font-family: inherit;
    }

    .game {
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #8fd3ff;
    }

    .top {
      height: 104px;
      background: #fff4cf;
      border-bottom: 5px solid #c78132;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      z-index: 200;
      flex-shrink: 0;
    }

    .title {
      font-size: 29px;
      font-weight: 900;
      color: #7a3f17;
      text-shadow: 2px 2px #ffd36f;
      line-height: 1.05;
    }

    .subtitle {
      font-size: 13px;
      color: #86582b;
      max-width: 700px;
    }

    .top-buttons {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-btn,
    .room-btn,
    .start-button {
      border: none;
      border-radius: 16px;
      padding: 9px 11px;
      font-weight: 900;
      font-size: 12px;
      color: #3b2414;
      background: #ffffff;
      border: 3px solid #bf7b2f;
      box-shadow: 0 4px 0 #8d551e;
      cursor: pointer;
    }

    .top-btn.on {
      background: #b9f5ff;
    }

    .top-btn:active,
    .room-btn:active,
    .start-button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8d551e;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .side {
      width: 140px;
      background: #ffe29a;
      border-right: 5px solid #cf9140;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 180;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .room-btn {
      color: #4c290f;
      background: #fff7db;
      padding: 10px 6px;
      font-size: 12px;
    }

    .room-btn.active {
      background: #ffbf47;
      outline: 3px solid white;
    }

    .scene {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #ffdca3;
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .wall {
      position: absolute;
      inset: 0 0 auto 0;
      height: 58%;
      background: linear-gradient(180deg, #ffd48a, #ffe1ad);
    }

    .floor {
      position: absolute;
      inset: auto 0 0 0;
      height: 42%;
      background: repeating-linear-gradient(
        90deg,
        #c98746 0px,
        #c98746 54px,
        #b87336 54px,
        #b87336 60px
      );
      border-top: 6px solid #8b4b24;
    }

    .outside-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #78d7ff 0%, #b9f5ff 52%, #8ddb6c 53%, #5fbe49 100%);
    }

    .garage-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #aeb8c1 0%, #d7dde2 55%, #777 56%, #555 100%);
    }

    .school-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #bdefff 0%, #fff2b8 55%, #d49455 56%, #b87336 100%);
    }

    .map-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #d4f5ff 0%, #fff1bd 100%);
    }

    .room-name {
      position: absolute;
      top: 12px;
      left: 16px;
      background: rgba(255,255,255,0.94);
      border: 3px solid #ab6d2b;
      border-radius: 18px;
      padding: 7px 13px;
      font-size: 20px;
      font-weight: 900;
      z-index: 60;
    }

    .inventory {
      position: absolute;
      top: 12px;
      right: 14px;
      max-width: 46%;
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
      z-index: 65;
    }

    .slot {
      background: white;
      border: 3px solid #bf7b2f;
      border-radius: 14px;
      padding: 5px 8px;
      min-width: 54px;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 0 3px 0 #8d551e;
      white-space: nowrap;
    }

    .message {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(860px, 88vw);
      min-height: 72px;
      background: #fff8df;
      border: 5px solid #8d551e;
      border-radius: 22px;
      padding: 12px 18px;
      z-index: 140;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 6px 0 rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.25;
    }

    .bounce-message {
      animation: popMessage 0.35s ease-in-out;
    }

    @keyframes popMessage {
      0% { transform: translateX(-50%) scale(1); }
      45% { transform: translateX(-50%) scale(1.04); }
      100% { transform: translateX(-50%) scale(1); }
    }

    .picture-clue {
      position: absolute;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      width: 210px;
      min-height: 118px;
      background: #fff8df;
      border: 6px solid #ffbf47;
      border-radius: 28px;
      z-index: 100;
      text-align: center;
      padding: 10px;
      box-shadow: 0 7px 0 rgba(0,0,0,0.2);
      animation: cluePop 0.35s ease-out;
    }

    .picture-clue .big-icon {
      font-size: 50px;
      line-height: 1;
    }

    .picture-clue .clue-text {
      font-size: 15px;
      font-weight: 900;
      margin-top: 6px;
    }

    @keyframes cluePop {
      0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    .peanut {
      position: absolute;
      left: 50%;
      bottom: 92px;
      width: 88px;
      height: 134px;
      background: #c9823b;
      border: 5px solid #7b4219;
      border-radius: 48% 48% 44% 44%;
      z-index: 50;
      box-shadow: inset 10px 0 #d99b58, 0 7px 0 rgba(0,0,0,0.18);
      transform: translateX(-50%);
    }

    .peanut.happy {
      animation: peanutBounce 1s infinite ease-in-out;
    }

    @keyframes peanutBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }

    .peanut::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 14px;
      width: 53px;
      height: 42px;
      border-radius: 50%;
      border-top: 5px solid rgba(90, 42, 13, 0.28);
    }

    .eye {
      position: absolute;
      top: 46px;
      width: 12px;
      height: 16px;
      background: #21130a;
      border-radius: 50%;
    }

    .eye.left { left: 21px; }
    .eye.right { right: 21px; }

    .smile {
      position: absolute;
      top: 75px;
      left: 27px;
      width: 29px;
      height: 15px;
      border-bottom: 5px solid #3a1d0c;
      border-radius: 0 0 50px 50px;
    }

    .cheek {
      position: absolute;
      top: 67px;
      width: 13px;
      height: 9px;
      background: #eaa06f;
      border-radius: 50%;
    }

    .cheek.left { left: 9px; }
    .cheek.right { right: 9px; }

    .arm {
      position: absolute;
      top: 79px;
      width: 36px;
      height: 10px;
      background: #7b4219;
      border-radius: 20px;
    }

    .arm.left {
      left: -29px;
      transform: rotate(-25deg);
    }

    .arm.right {
      right: -29px;
      transform: rotate(25deg);
    }

    .leg {
      position: absolute;
      bottom: -18px;
      width: 15px;
      height: 23px;
      background: #7b4219;
      border-radius: 12px;
    }

    .leg.left { left: 23px; }
    .leg.right { right: 23px; }

    .clickable {
      position: absolute;
      cursor: pointer;
      z-index: 30;
      transition: transform 0.12s, filter 0.12s;
    }

    .clickable:hover {
      transform: scale(1.04);
      filter: brightness(1.05);
    }

    .clickable:active {
      transform: scale(0.96);
    }

    .obj-label {
      position: absolute;
      left: 50%;
      bottom: -27px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      border: 2px solid #8d551e;
      border-radius: 10px;
      padding: 3px 7px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      pointer-events: none;
    }

    .window {
      width: 145px;
      height: 102px;
      left: 12%;
      top: 26%;
      background: #8fd3ff;
      border: 7px solid #8b4b24;
      border-radius: 14px;
    }

    .window::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 5px;
      height: 100%;
      background: #8b4b24;
    }

    .window::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      height: 5px;
      width: 100%;
      background: #8b4b24;
    }

    .plant {
      width: 90px;
      height: 135px;
      left: 13%;
      bottom: 132px;
    }

    .plant .pot {
      position: absolute;
      bottom: 0;
      left: 18px;
      width: 58px;
      height: 56px;
      background: #c45d2e;
      border: 5px solid #763016;
      border-radius: 9px 9px 19px 19px;
    }

    .leaf {
      position: absolute;
      width: 50px;
      height: 28px;
      background: #3dab52;
      border: 3px solid #19762c;
      border-radius: 50%;
    }

    .leaf.one { left: 2px; top: 38px; transform: rotate(-32deg); }
    .leaf.two { right: 0; top: 31px; transform: rotate(34deg); }
    .leaf.three { left: 24px; top: 10px; transform: rotate(83deg); }

    .couch {
      width: 220px;
      height: 90px;
      left: 34%;
      bottom: 132px;
      background: #ff7777;
      border: 6px solid #a43636;
      border-radius: 28px 28px 16px 16px;
    }

    .couch::before {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      top: -38px;
      height: 72px;
      background: #ff9292;
      border: 6px solid #a43636;
      border-radius: 25px;
      z-index: -1;
    }

    .rug {
      width: 240px;
      height: 78px;
      left: 58%;
      bottom: 62px;
      background: #7fc6ff;
      border: 6px solid #2776a8;
      border-radius: 50%;
      z-index: 24;
    }

    .door {
      width: 122px;
      height: 215px;
      right: 68px;
      bottom: 132px;
      background: #8b4b24;
      border: 7px solid #562c12;
      border-radius: 13px 13px 0 0;
      box-shadow: 0 8px 0 rgba(0,0,0,0.18);
    }

    .door::before {
      content: "";
      position: absolute;
      width: 19px;
      height: 19px;
      right: 18px;
      top: 104px;
      background: #ffd34d;
      border: 3px solid #5a3217;
      border-radius: 50%;
    }

    .fridge {
      width: 110px;
      height: 215px;
      left: 12%;
      bottom: 118px;
      background: #e7f7ff;
      border: 7px solid #5a8aa3;
      border-radius: 19px;
    }

    .fridge::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 80px;
      height: 5px;
      background: #5a8aa3;
    }

    .fridge::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 110px;
      width: 11px;
      height: 45px;
      background: #5a8aa3;
      border-radius: 10px;
    }

    .table {
      width: 250px;
      height: 40px;
      left: 38%;
      bottom: 178px;
      background: #9c5f2c;
      border: 6px solid #5f3518;
      border-radius: 12px;
      z-index: 32;
    }

    .table::before,
    .table::after {
      content: "";
      position: absolute;
      bottom: -84px;
      width: 20px;
      height: 82px;
      background: #5f3518;
      border-radius: 8px;
    }

    .table::before { left: 30px; }
    .table::after { right: 30px; }

    .cookiejar {
      width: 74px;
      height: 92px;
      left: calc(38% + 88px);
      bottom: 222px;
      background: #ffd1e6;
      border: 6px solid #ad5b82;
      border-radius: 25px;
      z-index: 34;
    }

    .cookiejar::before {
      content: "";
      position: absolute;
      left: 12px;
      top: -27px;
      width: 40px;
      height: 28px;
      background: #ffbad8;
      border: 6px solid #ad5b82;
      border-radius: 18px 18px 8px 8px;
    }

    .cabinet {
      width: 170px;
      height: 110px;
      right: 100px;
      bottom: 118px;
      background: #d28a45;
      border: 6px solid #774014;
      border-radius: 15px;
    }

    .cabinet::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 5px;
      background: #774014;
    }

    .cabinet::after {
      content: "";
      position: absolute;
      left: 76px;
      top: 44px;
      width: 18px;
      height: 18px;
      background: #ffd34d;
      border: 3px solid #774014;
      border-radius: 50%;
    }

    .mirror {
      width: 130px;
      height: 105px;
      left: 19%;
      top: 20%;
      background: #b9f3ff;
      border: 7px solid #8b4b24;
      border-radius: 50%;
    }

    .sink {
      width: 175px;
      height: 96px;
      left: 18%;
      bottom: 130px;
      background: #dff8ff;
      border: 7px solid #568aa1;
      border-radius: 18px 18px 30px 30px;
    }

    .sink::before {
      content: "";
      position: absolute;
      left: 56px;
      top: -31px;
      width: 50px;
      height: 29px;
      border: 8px solid #568aa1;
      border-bottom: none;
      border-radius: 24px 24px 0 0;
    }

    .sink::after {
      content: "";
      position: absolute;
      left: 75px;
      top: 29px;
      width: 23px;
      height: 23px;
      background: #89c9dd;
      border: 4px solid #568aa1;
      border-radius: 50%;
    }

    .towel {
      width: 92px;
      height: 116px;
      right: 160px;
      bottom: 137px;
      background: #ff9fc8;
      border: 6px solid #9d4265;
      border-radius: 15px;
    }

    .bathmat {
      width: 220px;
      height: 72px;
      left: 47%;
      bottom: 48px;
      background: #b699ff;
      border: 6px solid #5e45a3;
      border-radius: 50%;
      z-index: 24;
    }

    .bed {
      width: 270px;
      height: 105px;
      left: 20%;
      bottom: 118px;
      background: #7ea5ff;
      border: 6px solid #314d9a;
      border-radius: 18px;
      z-index: 32;
    }

    .bed::before {
      content: "";
      position: absolute;
      left: 0;
      bottom: -14px;
      width: 100%;
      height: 26px;
      background: #314d9a;
      border-radius: 0 0 18px 18px;
    }

    .pillow {
      width: 92px;
      height: 50px;
      left: calc(20% + 22px);
      bottom: 183px;
      background: #fff;
      border: 6px solid #aaa;
      border-radius: 21px;
      z-index: 34;
    }

    .toybox {
      width: 155px;
      height: 98px;
      right: 170px;
      bottom: 118px;
      background: #9de27f;
      border: 6px solid #39782d;
      border-radius: 16px;
    }

    .toybox::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: -23px;
      height: 30px;
      background: #c2f4a9;
      border: 6px solid #39782d;
      border-radius: 14px;
    }

    .lamp {
      width: 100px;
      height: 155px;
      right: 65px;
      bottom: 116px;
    }

    .lamp::before {
      content: "";
      position: absolute;
      left: 40px;
      bottom: 0;
      width: 17px;
      height: 88px;
      background: #5d3b2a;
      border-radius: 9px;
    }

    .lamp::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 0;
      width: 75px;
      height: 58px;
      background: #ffe45c;
      border: 6px solid #9b7610;
      border-radius: 31px 31px 12px 12px;
    }

    .flowers {
      width: 150px;
      height: 110px;
      left: 15%;
      bottom: 130px;
      font-size: 54px;
    }

    .flowers::before {
      content: "🌸🌼🌷";
      position: absolute;
    }

    .bush {
      width: 155px;
      height: 110px;
      left: 36%;
      bottom: 130px;
      background: #2fa84f;
      border: 6px solid #126b2a;
      border-radius: 50%;
    }

    .bush::before,
    .bush::after {
      content: "";
      position: absolute;
      background: #39bc5f;
      border: 5px solid #126b2a;
      border-radius: 50%;
    }

    .bush::before {
      width: 95px;
      height: 85px;
      left: -35px;
      bottom: 5px;
    }

    .bush::after {
      width: 95px;
      height: 85px;
      right: -35px;
      bottom: 5px;
    }

    .wateringcan {
      width: 130px;
      height: 90px;
      left: 58%;
      bottom: 130px;
      background: #89c9dd;
      border: 6px solid #336d83;
      border-radius: 20px;
    }

    .wateringcan::before {
      content: "";
      position: absolute;
      left: -50px;
      top: 20px;
      width: 58px;
      height: 22px;
      background: #89c9dd;
      border: 6px solid #336d83;
      border-radius: 25px 0 0 25px;
    }

    .birdhouse {
      width: 95px;
      height: 135px;
      right: 120px;
      bottom: 155px;
      background: #d28a45;
      border: 6px solid #774014;
    }

    .birdhouse::before {
      content: "";
      position: absolute;
      left: -16px;
      top: -46px;
      width: 120px;
      height: 70px;
      background: #c45d2e;
      border: 6px solid #763016;
      transform: rotate(45deg);
      z-index: -1;
    }

    .birdhouse::after {
      content: "";
      position: absolute;
      left: 34px;
      top: 45px;
      width: 26px;
      height: 26px;
      background: #3b2414;
      border-radius: 50%;
    }

    .toolbox {
      width: 155px;
      height: 88px;
      left: 15%;
      bottom: 120px;
      background: #e34b4b;
      border: 6px solid #7a1f1f;
      border-radius: 16px;
    }

    .toolbox::before {
      content: "";
      position: absolute;
      left: 48px;
      top: -28px;
      width: 55px;
      height: 30px;
      border: 7px solid #7a1f1f;
      border-bottom: none;
      border-radius: 20px 20px 0 0;
    }

    .shelves {
      width: 180px;
      height: 168px;
      left: 38%;
      bottom: 112px;
      background: #9c5f2c;
      border: 6px solid #5f3518;
    }

    .shelves::before,
    .shelves::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 6px;
      background: #5f3518;
    }

    .shelves::before { top: 55px; }
    .shelves::after { top: 112px; }

    .tire {
      width: 112px;
      height: 112px;
      left: 62%;
      bottom: 115px;
      background: #333;
      border: 18px solid #111;
      border-radius: 50%;
      box-shadow: inset 0 0 0 14px #777;
    }

    .workbench {
      width: 215px;
      height: 48px;
      right: 78px;
      bottom: 182px;
      background: #9c5f2c;
      border: 6px solid #5f3518;
      border-radius: 12px;
    }

    .workbench::before,
    .workbench::after {
      content: "";
      position: absolute;
      bottom: -95px;
      width: 22px;
      height: 90px;
      background: #5f3518;
      border-radius: 8px;
    }

    .workbench::before { left: 30px; }
    .workbench::after { right: 30px; }

    .gate {
      width: 250px;
      height: 150px;
      left: 50%;
      bottom: 120px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(
        90deg,
        #9b5a28 0px,
        #9b5a28 28px,
        #6d3b15 28px,
        #6d3b15 35px
      );
      border: 7px solid #4d260d;
      border-radius: 15px;
    }

    .gate::before {
      content: "YARD GATE";
      position: absolute;
      left: 50%;
      top: -45px;
      transform: translateX(-50%);
      background: #fff8df;
      border: 4px solid #8d551e;
      border-radius: 16px;
      padding: 7px 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .person {
      position: absolute;
      width: 90px;
      height: 135px;
      z-index: 55;
      cursor: pointer;
      transition: transform 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      font-weight: 900;
      text-align: center;

    function beginGame() {
      gameStarted = true;
      startScreen.style.display = "none";
      setTimeout(function () {
        playVoice("start");
      }, 120);
    }

    function toggleAutoRead() {
      autoRead = !autoRead;

      if (autoRead) {
        autoReadBtn.textContent = "🔊 Auto On";
        autoReadBtn.classList.add("on");
        setMessage("Auto Read is on.", "start");
      } else {
        autoReadBtn.textContent = "🔈 Auto Off";
        autoReadBtn.classList.remove("on");
        stopAudio();
        setMessage("Auto Read is off. Press Read when you want to hear the story.", null);
      }
    }

    function setMessage(text, audioKey) {
      message.textContent = text;
      currentAudioKey = audioKey || null;

      message.classList.remove("bounce-message");
      void message.offsetWidth;
      message.classList.add("bounce-message");

      if (autoRead && audioKey && gameStarted) {
        playVoice(audioKey);
      }
    }

    function showPictureClue(room, text) {
      const icon = roomIcons[room] || "⭐";
      pictureClue.innerHTML = `
        <div class="picture-clue">
          <div class="big-icon">${icon}</div>
          <div class="clue-text">${text}</div>
        </div>
      `;
    }

    function addInventory(item) {
      if (!game.inventory.includes(item)) {
        game.inventory.push(item);
      }
      renderInventory();
    }

    function renderInventory() {
      inventory.innerHTML = "";

      if (game.inventory.length === 0) {
        inventory.innerHTML = '<div class="slot">Empty</div>';
        return;
      }

      game.inventory.forEach(item => {
        const div = document.createElement("div");
        div.className = "slot";
        div.textContent = item;
        inventory.appendChild(div);
      });
    }

    function clearScene() {
      document.querySelectorAll(".game-piece").forEach(el => el.remove());
    }

    function renderBackground(type) {
      peanut.classList.remove("happy");

      if (type === "inside") {
        background.innerHTML = '<div class="wall"></div><div class="floor"></div>';
      }

      if (type === "outside") {
        background.innerHTML = '<div class="outside-bg"></div>';
        peanut.classList.add("happy");
      }

      if (type === "garage") {
        background.innerHTML = '<div class="garage-bg"></div>';
      }

      if (type === "school") {
        background.innerHTML = '<div class="school-bg"></div>';
      }

      if (type === "map") {
        background.innerHTML = '<div class="map-bg"></div>';
        peanut.classList.add("happy");
      }
    }

    function makeRealObject(obj, clickHandler) {
      const el = document.createElement("div");
      el.className = "clickable game-piece " + obj.className;

      if (obj.className === "plant") {
        el.innerHTML = '<div class="leaf one"></div><div class="leaf two"></div><div class="leaf three"></div><div class="pot"></div>';
      }

      const label = document.createElement("div");
      label.className = "obj-label";
      label.textContent = obj.label;
      el.appendChild(label);

      el.onclick = clickHandler;
      scene.appendChild(el);
    }

    function makeSmallObject(obj, clickHandler) {
      const el = document.createElement("div");
      el.className = "small-object game-piece";
      el.style.left = obj.x + "%";
      el.style.top = obj.y + "%";
      el.innerHTML = `${obj.emoji}<div class="obj-label">${obj.label}</div>`;
      el.onclick = clickHandler;
      scene.appendChild(el);
    }

    function makePerson(kind, x, y, clickHandler) {
      const el = document.createElement("div");
      el.className = "person game-piece " + kind;
      el.style.left = x + "%";
      el.style.top = y + "%";
      el.innerHTML = `
        <div class="person-face"></div>
        <div class="person-body"></div>
        <div>${kind === "mommy" ? "Mommy" : "Daddy"}</div>
      `;
      el.onclick = clickHandler;
      scene.appendChild(el);
    }

    function renderSide() {
      side.innerHTML = "";

      let rooms = [];

      if (game.stage === "house") {
        rooms = [
          { id: "living", name: "🛋️ Living" },
          { id: "kitchen", name: "🍪 Kitchen" },
          { id: "bathroom", name: "🛁 Bath" },
          { id: "bedroom", name: "🛏️ Bed" }
        ];
      }

      if (game.stage === "yard") {
        rooms = [
          { id: "garden", name: "🌸 Garden" },
          { id: "garage", name: "🔧 Garage" },
          { id: "yardgate", name: "🚪 Gate" }
        ];
      }

      if (game.stage === "bus") {
        rooms = [{ id: "bus", name: "🚌 Bus" }];
      }

      if (game.stage === "school") {
        rooms = [
          { id: "classroom", name: "✏️ Class" },
          { id: "library", name: "📚 Library" },
          { id: "schoolExit", name: "🏫 Exit" }
        ];
      }

      if (game.stage === "map") {
        rooms = [{ id: "map", name: "🗺️ Map" }];
      }

      rooms.forEach(room => {
        const btn = document.createElement("button");
        btn.className = "room-btn" + (currentRoom === room.id ? " active" : "");
        btn.textContent = room.name;
        btn.onclick = function () {
          currentRoom = room.id;
          render();
          giveRoomReminder();
        };
        side.appendChild(btn);
      });
    }

    function render() {
      clearScene();
      renderInventory();
      renderSide();

      if (game.stage === "house") renderHouse();
      if (game.stage === "yard") renderYard();
      if (game.stage === "bus") renderBus();
      if (game.stage === "school") renderSchool();
      if (game.stage === "map") renderMap();
    }

    function renderHouse() {
      renderBackground("inside");
      roomName.textContent = roomNames[currentRoom];

      houseObjects[currentRoom].forEach(obj => {
        makeRealObject(obj, function () {
          searchHouseObject(obj);
        });
      });

      if (currentRoom === "living") {
        const door = document.createElement("div");
        door.className = "clickable game-piece door";
        door.onclick = tryFrontDoor;
        scene.appendChild(door);

        const label = document.createElement("div");
        label.className = "obj-label";
        label.textContent = "Front Door";
        door.appendChild(label);
      }
    }

    function searchHouseObject(obj) {
      const step = houseStory[game.houseStep];

      if (!step) {
        setMessage("Peanut has the key. Tap the front door!", "go_door");
        showPictureClue("living", "Go to the door!");
        return;
      }

      if (currentRoom !== step.room) {
        setMessage("This is a fun room, but the picture clue shows a different room.", "wrong_room_house");
        showPictureClue(step.room, "Go here!");
        return;
      }

      const correctObjectId = game.houseTargets[step.room];

      if (obj.id === correctObjectId) {
        addInventory(step.item);
        setMessage(step.message, step.audio);

        if (step.item === "🔑 Key") {
          showPictureClue("living", "Go to the door!");
        } else {
          showPictureClue(step.nextRoom, "Go here next!");
        }

        game.houseStep++;
        makeConfetti();
        vibrate([80, 40, 80]);
        return;
      }

      setMessage("Not there. Try another object in this room.", "try_another_object");
      showPictureClue(step.room, "Look in this room!");
      vibrate(40);
    }

    function tryFrontDoor() {
      if (game.houseStep < houseStory.length) {
        setMessage("The front door is locked. Peanut needs the key first.", "door_locked");
        const step = houseStory[game.houseStep];
        showPictureClue(step.room, "Find this clue!");
        vibrate(60);
        return;
      }

      setMessage("Peanut unlocked the door! Now find Mommy in the garden.", "door_unlocked");
      showPictureClue("garden", "Find Mommy!");
      makeConfetti();
      vibrate([100, 50, 100]);

      setTimeout(function () {
        game.stage = "yard";
        currentRoom = "garden";
        render();
        setMessage("Peanut is outside! Find Mommy in the garden.", "find_mommy");
        showPictureClue("garden", "Find Mommy!");
      }, 900);
    }

    function renderYard() {
      if (currentRoom === "garage") {
        renderBackground("garage");
      } else {
        renderBackground("outside");
      }

      roomName.textContent = roomNames[currentRoom];

      if (currentRoom === "garden") {
        yardObjects.garden.forEach(obj => {
          makeRealObject(obj, function () {
            searchGarden(obj);
          });
        });

        if (game.found.mommy) {
          makePerson("mommy", 78, 47, function () {
            setMessage("Mommy says, great job Peanut! Now go find Daddy in the garage.", "mommy_talk");
            showPictureClue("garage", "Find Daddy!");
          });
        }
      }

      if (currentRoom === "garage") {
        yardObjects.garage.forEach(obj => {
          makeRealObject(obj, function () {
            searchGarage(obj);
          });
        });

        if (game.found.daddy) {
          makePerson("daddy", 78, 47, function () {
            setMessage("Daddy says, you found me! Now go to the yard gate.", "daddy_talk");
            showPictureClue("yardgate", "Go to gate!");
          });
        }
      }

      if (currentRoom === "yardgate") {
        const gate = document.createElement("div");
        gate.className = "clickable game-piece gate";
        gate.onclick = tryYardGate;
        scene.appendChild(gate);

        makeSmallObject(
          { label: "Mailbox", emoji: "📬", x: 20, y: 50 },
          function () {
            setMessage("The mailbox says, the school bus is waiting!", "mailbox");
          }
        );

        makeSmallObject(
          { label: "Dog House", emoji: "🐶", x: 72, y: 53 },
          function () {
            setMessage("The dog says, woof woof bus!", "dog_house");
          }
        );
      }
    }

    function searchGarden(obj) {
      if (game.found.mommy) {
        setMessage("Mommy is already found. Go to the garage to find Daddy.", "mommy_already_found");
        showPictureClue("garage", "Find Daddy!");
        return;
      }

      if (obj.id === game.mommySpot) {
        game.found.mommy = true;
        addInventory("💗 Mommy");
        setMessage("You found Mommy! Great job! Now find Daddy in the garage.", "mommy_found");
        showPictureClue("garage", "Find Daddy!");
        makeConfetti();
        vibrate([80, 40, 80]);
        render();
        return;
      }

      setMessage("Mommy is not there. Try another garden object.", "mommy_not_there");
      showPictureClue("garden", "Find Mommy!");
      vibrate(40);
    }

    function searchGarage(obj) {
      if (!game.found.mommy) {
        setMessage("Peanut should find Mommy in the garden first.", "need_mommy_first");
        showPictureClue("garden", "Find Mommy!");
        return;
      }

      if (game.found.daddy) {
        setMessage("Daddy is already found. Go to the yard gate.", "daddy_already_found");
        showPictureClue("yardgate", "Go to gate!");
        return;
      }

      if (obj.id === game.daddySpot) {
        game.found.daddy = true;
        addInventory("🧢 Daddy");
        addInventory("🚌 Bus Pass");
        setMessage("You found Daddy in the garage! Daddy gives Peanut a bus pass. Go to the yard gate.", "daddy_found");
        showPictureClue("yardgate", "Go to gate!");
        makeConfetti();
        vibrate([80, 40, 80]);
        render();
        return;
      }

      setMessage("Daddy is not there. Try another garage object.", "daddy_not_there");
      showPictureClue("garage", "Find Daddy!");
      vibrate(40);
    }

    function tryYardGate() {
      if (!game.found.mommy) {
        setMessage("Peanut needs Mommy first. Go to the garden.", "need_mommy_gate");
        showPictureClue("garden", "Find Mommy!");
        return;
      }

      if (!game.found.daddy) {
        setMessage("Peanut needs Daddy first. Go to the garage.", "need_daddy_gate");
        showPictureClue("garage", "Find Daddy!");
        return;
      }

      setMessage("The gate opens! Peanut runs to the school bus.", "gate_opens");
      showPictureClue("bus", "Go to bus!");
      makeConfetti();
      vibrate([100, 50, 100]);

      setTimeout(function () {
        game.stage = "bus";
        currentRoom = "bus";
        render();
        setMessage("Peanut made it to the school bus. Find the backpack.", "find_backpack");
        showPictureClue("bus", "Find backpack!");
      }, 900);
    }

    function renderBus() {
      renderBackground("outside");
      roomName.textContent = "School Bus";

      const bus = document.createElement("div");
      bus.className = "bus game-piece";
      bus.innerHTML = `
        <div class="bus-window w1"></div>
        <div class="bus-window w2"></div>
        <div class="bus-window w3"></div>
        <div class="bus-window w4"></div>
      `;
      bus.onclick = tryRideBus;
      scene.appendChild(bus);

      busObjects.forEach(obj => {
        makeSmallObject(obj, function () {
          searchBus(obj);
        });
      });
    }

    function searchBus(obj) {
      if (game.found.backpack) {
        setMessage("Peanut has the backpack. Tap the big school bus.", "tap_bus");
        showPictureClue("bus", "Tap the bus!");
        return;
      }

      if (obj.id === game.backpackSpot) {
        game.found.backpack = true;
        addInventory("🎒 Backpack");
        setMessage("Peanut found the backpack! Tap the big school bus.", "backpack_found");
        showPictureClue("bus", "Tap the bus!");
        makeConfetti();
        vibrate([80, 40, 80]);
        return;
      }

      setMessage("No backpack there. Try another bus spot.", "backpack_not_there");
      showPictureClue("bus", "Find backpack!");
      vibrate(40);
    }

    function tryRideBus() {
      if (!game.found.backpack) {
        setMessage("Peanut needs the backpack before riding to school.", "need_backpack");
        showPictureClue("bus", "Find backpack!");
        return;
      }

      setMessage("Peanut rides the bus to school!", "go_school");
      showPictureClue("classroom", "Go to class!");
      makeConfetti();
      vibrate([100, 50, 100]);

      setTimeout(function () {
        game.stage = "school";
        currentRoom = "classroom";
        render();
        setMessage("Peanut is at school! Find the letters in the classroom.", "find_letters");
        showPictureClue("classroom", "Find letters!");
      }, 900);
    }

    function renderSchool() {
      renderBackground("school");
      roomName.textContent = roomNames[currentRoom];

      if (currentRoom === "classroom") {
        schoolObjects.classroom.forEach(obj => {
          makeSmallObject(obj, function () {
            searchSchool(obj);
          });
        });
      }

      if (currentRoom === "library") {
        schoolObjects.library.forEach(obj => {
          makeSmallObject(obj, function () {
            searchSchool(obj);
          });
        });
      }

      if (currentRoom === "schoolExit") {
        const door = document.createElement("div");
        door.className = "school-door game-piece";
        door.onclick = trySchoolExit;
        scene.appendChild(door);

        makeSmallObject(
          { label: "Bell", emoji: "🔔", x: 36, y: 43 },
          function () {
            setMessage("Ring ring! Peanut is ready for more adventures.", "school_bell");
          }
        );
      }
    }

    function searchSchool(obj) {
      if (!game.found.letters && currentRoom === "classroom" && obj.id === game.letterSpot) {
        game.found.letters = true;
        addInventory("🔤 ABC");
        setMessage("Peanut found letters! A B C! Now go to the library.", "letters_found");
        showPictureClue("library", "Find numbers!");
        makeConfetti();
        vibrate([80, 40, 80]);
        return;
      }

      if (!game.found.letters) {
        setMessage("Look for letters in the classroom.", "look_for_letters");
        showPictureClue("classroom", "Find letters!");
        return;
      }

      if (!game.found.numbers && currentRoom === "library" && obj.id === game.numberSpot) {
        game.found.numbers = true;
        addInventory("🔢 123");
        setMessage("Peanut found numbers! One, two, three! Now find the hall pass.", "numbers_found");
        showPictureClue(currentRoom, "Find pass!");
        makeConfetti();
        vibrate([80, 40, 80]);
        return;
      }

      if (!game.found.numbers) {
        setMessage("Look for numbers in the library.", "look_for_numbers");
        showPictureClue("library", "Find numbers!");
        return;
      }

      if (!game.found.hallPass && obj.id === game.hallPassSpot) {
        game.found.hallPass = true;
        addInventory("🎫 Pass");
        setMessage("Peanut found the hall pass! Go to the school exit.", "hall_pass_found");
        showPictureClue("schoolExit", "Go to exit!");
        makeConfetti();
        vibrate([80, 40, 80]);
        return;
      }

      if (!game.found.hallPass) {
        setMessage("Look for the hall pass.", "look_for_hall_pass");
        showPictureClue(currentRoom, "Find pass!");
        return;
      }

      setMessage("Go to the school exit.", "go_school_exit");
      showPictureClue("schoolExit", "Go to exit!");
    }

    function trySchoolExit() {
      if (!game.found.letters) {
        setMessage("Peanut needs letters first.", "need_letters");
        showPictureClue("classroom", "Find letters!");
        return;
      }

      if (!game.found.numbers) {
        setMessage("Peanut needs numbers first.", "need_numbers");
        showPictureClue("library", "Find numbers!");
        return;
      }

      if (!game.found.hallPass) {
        setMessage("Peanut needs the hall pass first.", "need_hall_pass");
        showPictureClue(currentRoom, "Find pass!");
        return;
      }

      setMessage("Peanut finished school and unlocked the adventure map!", "adventure_map");
      makeConfetti();
      vibrate([100, 50, 100]);

      setTimeout(function () {
        game.stage = "map";
        currentRoom = "map";
        render();
        setMessage("Choose Peanut’s next adventure.", "choose_adventure");
        showPictureClue("map", "Pick one!");
      }, 900);
    }

    function renderMap() {
      renderBackground("map");
      roomName.textContent = "Adventure Map";

      const positions = [
        { x: 14, y: 23 },
        { x: 39, y: 23 },
        { x: 64, y: 23 },
        { x: 14, y: 54 },
        { x: 39, y: 54 },
        { x: 64, y: 54 }
      ];

      adventures.forEach((place, index) => {
        const card = document.createElement("div");
        card.className = "map-card game-piece";
        card.style.left = positions[index].x + "%";
        card.style.top = positions[index].y + "%";
        card.innerHTML = `
          <div class="emoji">${place.emoji}</div>
          <div>${place.name}</div>
        `;
        card.onclick = function () {
          addInventory(place.item);
          setMessage("Peanut starts the " + place.name + " adventure! This will become a full escape scene later.", place.audio);
          showPictureClue("map", place.emoji + " unlocked!");
          makeConfetti();
          vibrate([80, 40, 80]);
        };
        scene.appendChild(card);
      });
    }

    function giveHint() {
      if (game.stage === "house") {
        const step = houseStory[game.houseStep];

        if (!step) {
          setMessage("Peanut found the key! Go tap the front door.", "go_door");
          showPictureClue("living", "Go to door!");
          return;
        }

        const audioForRoom = {
          living: "living_search_here",
          kitchen: "kitchen_search_here",
          bathroom: "bathroom_search_here",
          bedroom: "bedroom_search_here"
        };

        setMessage("Good job! Search the " + roomNames[step.room].toLowerCase() + ".", audioForRoom[step.room]);
        showPictureClue(step.room, "Go here!");
        return;
      }

      if (game.stage === "yard") {
        if (!game.found.mommy) {
          setMessage("Peanut is outside! Find Mommy in the garden.", "find_mommy");
          showPictureClue("garden", "Find Mommy!");
          return;
        }

        if (!game.found.daddy) {
          setMessage("Great job! Now find Daddy in the garage.", "find_daddy");
          showPictureClue("garage", "Find Daddy!");
          return;
        }

        setMessage("Daddy gives Peanut a bus pass. Go to the yard gate.", "go_gate");
        showPictureClue("yardgate", "Go to gate!");
        return;
      }

      if (game.stage === "bus") {
        setMessage("Peanut made it to the school bus. Find the backpack.", "find_backpack");
        showPictureClue("bus", "Find backpack!");
        return;
      }

      if (game.stage === "school") {
        if (!game.found.letters) {
          setMessage("Peanut is at school! Find the letters in the classroom.", "find_letters");
          showPictureClue("classroom", "Find letters!");
          return;
        }

        if (!game.found.numbers) {
          setMessage("Find numbers in the library.", "find_numbers");
          showPictureClue("library", "Find numbers!");
          return;
        }

        if (!game.found.hallPass) {
          setMessage("Find the hall pass.", "find_hall_pass");
          showPictureClue(currentRoom, "Find pass!");
          return;
        }

        setMessage("Go to the school exit.", "go_school_exit");
        showPictureClue("schoolExit", "Go to exit!");
        return;
      }

      if (game.stage === "map") {
        setMessage("Pick any adventure picture.", "pick_adventure");
        showPictureClue("map", "Pick one!");
      }
    }

    function giveRoomReminder() {
      if (game.stage === "house") {
        const step = houseStory[game.houseStep];

        if (!step) {
          setMessage("Peanut found the key! Go tap the front door.", "go_door");
          showPictureClue("living", "Go to door!");
          return;
        }

        const audioForRoom = {
          living: "living_search_here",
          kitchen: "kitchen_search_here",
          bathroom: "bathroom_search_here",
          bedroom: "bedroom_search_here"
        };

        if (currentRoom === step.room) {
          setMessage("Good job! Search the " + roomNames[step.room].toLowerCase() + ".", audioForRoom[step.room]);
          showPictureClue(step.room, "Search here!");
        } else {
          setMessage("This is a fun room, but the picture clue shows a different room.", "wrong_room_house");
          showPictureClue(step.room, "Go here!");
        }
      }
    }

    function makeConfetti() {
      const colors = ["#ff7777", "#ffd34d", "#7fc6ff", "#9de27f", "#b699ff", "#ff9fc8"];

      for (let i = 0; i < 18; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti game-piece";
        piece.style.left = Math.random() * 94 + "%";
        piece.style.top = "-35px";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 1.7 + "s";
        piece.style.animationDuration = 2 + Math.random() * 2.2 + "s";
        scene.appendChild(piece);
      }
    }

    function newGame() {
      stopAudio();

      game.stage = "house";
      game.houseStep = 0;
      game.found = {};
      game.inventory = [];
      game.houseTargets = {};

      game.houseTargets.living = chooseOne(houseObjects.living).id;
      game.houseTargets.kitchen = chooseOne(houseObjects.kitchen).id;
      game.houseTargets.bathroom = chooseOne(houseObjects.bathroom).id;
      game.houseTargets.bedroom = chooseOne(houseObjects.bedroom).id;

      game.mommySpot = chooseOne(yardObjects.garden).id;
      game.daddySpot = chooseOne(yardObjects.garage).id;

      game.backpackSpot = chooseOne(busObjects).id;

      const classPick = chooseOne(schoolObjects.classroom);
      const libraryPick = chooseOne(schoolObjects.library);
      game.letterSpot = classPick.id;
      game.numberSpot = libraryPick.id;
      game.hallPassSpot = chooseOne([...schoolObjects.classroom, ...schoolObjects.library]).id;

      currentRoom = "living";
      render();
      setMessage("Help Peanut escape! Tap objects in the living room to find a picture clue.", "start");
      showPictureClue("living", "Start here!");
    }

    newGame();
  </script>
</body>
</html>
